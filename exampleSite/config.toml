baseURL               = "/"
languageCode          = "zh-CN"
title                 = "我的网址导航"
theme                 = "WebStack-Hugo"
preserveTaxonomyNames = true
disablePathToLower    = true
hasCJKLanguage        = true
publishDir            = "public"

[params]
    author        = "okekrr"
    description   = "个人常用网址导航"
    upload        = ""
    about         = "/about/"
    repository    = ""
    enablePreLoad = true
    textPreLoad   = "我的网址导航"
    expandSidebar = false
    logosPath     = "assets/images/logos"
    defaultLogo   = "assets/images/logos/default.webp"
    nightMode     = false
    yiyan         = false
    fancybox      = true

[params.seo]
    baiduhmid       = ''
    baiduSiteVer    = ''
    tj51laid        = ''
    tj51lack        = ''
    GoogleAdsClient = ''

[params.qweather]
    key = ""

[params.images]
    favicon           = "assets/images/favicon.png"
    searchImageL      = "assets/images/bg-search.png"
    searchImageD      = "assets/images/bg-search.png"
    logoExpandLight   = "assets/images/logo-expand.png"
    logoExpandDark    = "assets/images/logo-expand.png"
    logoCollapseLight = "assets/images/logo-collapse.png"
    logoCollapseDark  = "assets/images/logo-collapse.png"

[markup.goldmark.renderer]
    unsafe = true

[params.footer]
    copyright = '&copy; 2024 - {year} 我的网址导航'
